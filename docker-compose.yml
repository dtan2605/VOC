services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: voc-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - voc-network

  mysql:
    image: mysql:8.4
    container_name: voc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: voc_auth
    ports:
      - "${MYSQL_HOST_PORT:-3309}:3306"
    volumes:
      - ./infrastructure/mysql/data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - voc-network

  auth-service:
    build:
      context: ./backend/src
      dockerfile: ./Services/AuthService/AuthService.API/Dockerfile
    container_name: voc-auth-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AuthDatabase: Server=mysql;Port=3306;Database=voc_auth;User=voc_user;Password=ChangeMe123!;
      JwtSettings__Issuer: VOC.AuthService
      JwtSettings__Audience: VOC.Client
      JwtSettings__Secret: ReplaceThisWithASecureLongRandomSecretAtDeployTime
      JwtSettings__AccessTokenExpirationMinutes: "15"
      JwtSettings__RefreshTokenExpirationDays: "7"
      JwtSettings__AllowedOrigins: http://localhost:3000,http://localhost:5173,http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5058:8080"
    networks:
      - voc-network

  user-service:
    build:
      context: ./backend/src
      dockerfile: ./Services/UserService/UserService.API/Dockerfile
    container_name: voc-user-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__UserDatabase: Server=mysql;Port=3306;Database=voc_user;User=voc_user;Password=ChangeMe123!;
      JwtSettings__Issuer: VOC.AuthService
      JwtSettings__Audience: VOC.Client
      JwtSettings__Secret: ReplaceThisWithASecureLongRandomSecretAtDeployTime
      JwtSettings__AllowedOrigins: http://localhost:3000,http://localhost:5173,http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5029:8080"
    networks:
      - voc-network
    volumes:
      - ./data/avatars:/data/avatars

  vocabulary-service:
    build:
      context: ./backend/src
      dockerfile: ./Services/VocabularyService/VocabularyService.API/Dockerfile
    container_name: voc-vocabulary-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__VocabularyDatabase: Server=mysql;Port=3306;Database=voc_vocabulary;User=voc_user;Password=ChangeMe123!;
      JwtSettings__Issuer: VOC.AuthService
      JwtSettings__Audience: VOC.Client
      JwtSettings__Secret: ReplaceThisWithASecureLongRandomSecretAtDeployTime
      JwtSettings__AllowedOrigins: http://localhost:3000,http://localhost:5173,http://localhost
      AiServices__NlpServiceBaseUrl: http://nlp-service:8000
      AiServices__TranslationServiceBaseUrl: http://translation-service:8002
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      RabbitMq__Exchange: voc.ai
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "5063:8080"
    networks:
      - voc-network

  nlp-service:
    build:
      context: ./ai-services/services/nlp-service
      dockerfile: ./Dockerfile
    container_name: voc-nlp-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./ai-services/models/spacy:/root/.cache/spacy
      - ./ai-services/models/nltk:/root/nltk_data
    networks:
      - voc-network

  translation-service:
    build:
      context: ./ai-services/services/translation-service
      dockerfile: ./Dockerfile
    container_name: voc-translation-service
    restart: unless-stopped
    environment:
      ARGOS_PACKAGES_DIR: /root/.local/share/argos-translate/packages
      ARGOS_DEVICE_TYPE: cpu
    ports:
      - "8002:8002"
    volumes:
      - ./ai-services/models/argos:/root/.local/share/argos-translate
    networks:
      - voc-network

  learning-service:
    build:
      context: ./backend/src
      dockerfile: ./Services/LearningService/LearningService.API/Dockerfile
    container_name: voc-learning-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LearningDatabase: Server=mysql;Port=3306;Database=voc_learning;User=voc_user;Password=ChangeMe123!;
      JwtSettings__Issuer: VOC.AuthService
      JwtSettings__Audience: VOC.Client
      JwtSettings__Secret: ReplaceThisWithASecureLongRandomSecretAtDeployTime
      JwtSettings__AllowedOrigins: http://localhost:3000,http://localhost:5173,http://localhost
      DownstreamServices__VocabularyServiceBaseUrl: http://vocabulary-service:8080
      DownstreamServices__AnalyticsServiceBaseUrl: http://analytics-service:80
      INTERNAL_API_KEY: ChangeMeSecret
    depends_on:
      mysql:
        condition: service_healthy
      vocabulary-service:
        condition: service_started
    ports:
      - "5068:8080"
    networks:
      - voc-network

  analytics-service:
    build:
      context: ./backend/src/Services/AnalyticsService
      dockerfile: Dockerfile
    container_name: voc-analytics-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ANALYTICS_DB: Server=mysql;Port=3306;Database=voc_analytics;User=root;Password=password;
      INTERNAL_API_KEY: ChangeMeSecret
      AGGREGATOR_INTERVAL_SECONDS: "60"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5100:80"
    networks:
      - voc-network

  recommendation-service:
    build:
      context: ./ai-services/services/recommendation-service
      dockerfile: ./Dockerfile
      args:
        - BUILD_TYPE=prod
    container_name: voc-recommendation-service
    restart: unless-stopped
    ports:
      - "8005:8004"
    networks:
      - voc-network

  speech-service:
    build:
      context: ./ai-services/services/speech-service
      dockerfile: ./Dockerfile
    container_name: voc-speech-service
    restart: unless-stopped
    env_file:
      - ./ai-services/services/speech-service/.env
    depends_on:
      mysql:
        condition: service_healthy
      kokoro-init:
        condition: service_completed_successfully
    ports:
      - "8003:8003"
    volumes:
      - ./ai-services/models/stt:/root/.cache/huggingface
      - ./models/tts:/app/models/tts
      - ./ai-services/services/speech-service/.env:/app/.env:ro
    networks:
      - voc-network

  ollama:
    image: ollama/ollama:latest
    container_name: voc-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ./ai-services/models/ollama:/root/.ollama
    networks:
      - voc-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: voc-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2:1b
    entrypoint: ["/bin/sh", "-c"]
    command: ['ollama pull "$$OLLAMA_MODEL"']
    networks:
      - voc-network

  kokoro-init:
    image: curlimages/curl:8.10.1
    container_name: voc-kokoro-init
    restart: "no"
    user: "0:0"
    volumes:
      - ./models/tts:/models
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        set -e;
        if [ ! -s /models/kokoro-v1.0.onnx ]; then
          curl -L --fail -o /models/kokoro-v1.0.onnx https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx;
        fi;
        if [ ! -s /models/voices-v1.0.bin ]; then
          curl -L --fail -o /models/voices-v1.0.bin https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin;
        fi
    networks:
      - voc-network

  api-gateway:
    build:
      context: ./backend/src
      dockerfile: ./ApiGateway/ApiGateway/Dockerfile
    container_name: voc-api-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Gateway__AllowedOrigins: http://localhost:3000,http://localhost:5173,http://localhost
      Gateway__Routes__AuthService: http://auth-service:8080
      Gateway__Routes__UserService: http://user-service:8080
      Gateway__Routes__VocabularyService: http://vocabulary-service:8080
      Gateway__Routes__LearningService: http://learning-service:8080
      Gateway__Routes__AnalyticsService: http://analytics-service:80
      Gateway__Routes__SpeakingService: http://speech-service:8003
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      vocabulary-service:
        condition: service_started
      nlp-service:
        condition: service_started
      translation-service:
        condition: service_started
      learning-service:
        condition: service_started
      speech-service:
        condition: service_started
    ports:
      - "5120:8080"
    networks:
      - voc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    container_name: voc-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - voc-network

networks:
  voc-network:
    driver: bridge
